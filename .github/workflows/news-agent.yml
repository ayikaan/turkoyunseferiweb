name: News Agent (15-min Cron)

on:
  schedule:
    # Every 15 minutes — free for public repos
    - cron: '*/15 * * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news agent
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          NEWS_API_URL:         ${{ secrets.NEWS_API_URL }}
          NEWS_API_TOKEN:       ${{ secrets.NEWS_API_TOKEN }}
          X_COOKIE:             ${{ secrets.X_COOKIE }}
          YOUTUBE_COOKIE:       ${{ secrets.YOUTUBE_COOKIE }}
          GROQ_MODEL:           ${{ secrets.GROQ_MODEL }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          WHATSAPP_PHONE:       ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY:     ${{ secrets.WHATSAPP_API_KEY }}
        run: python news_agent.py
